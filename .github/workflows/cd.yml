name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Set Kubernetes context
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME/.kube" | Out-Null
          Set-Content -Path "$HOME/.kube/config" -Value "${{ secrets.KUBE_CONFIG }}"
      - name: Update image tag
        shell: pwsh
        run: |
          $path = "k8s/deployment.yaml"
          $content = Get-Content $path -Raw
          $content = $content.Replace(
            "your-dockerhub-username/django-blog:latest",
            "${{ secrets.DOCKERHUB_USERNAME }}/django-blog:${{ github.sha }}"
          )
          Set-Content -Path $path -Value $content
      - name: Deploy to cluster
        shell: pwsh
        run: kubectl apply -f k8s/
