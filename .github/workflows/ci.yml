name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/local.txt
      - name: Lint with flake8
        working-directory: backend
        run: flake8 .
      - name: Run tests with pytest
        working-directory: backend
        run: pytest
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t django-blog:${{ github.sha }} .
      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Publish Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag django-blog:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/django-blog:${{ github.sha }}
          docker tag django-blog:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/django-blog:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/django-blog:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/django-blog:latest
